spring:
  application:
    name: gridclan-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:6543}/${DB_NAME:postgres}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL:true}
      # Remote managed Redis (Upstash) needs headroom for the TLS handshake;
      # the old 2s timeout closed the channel mid-handshake (StacklessClosedChannelException).
      connect-timeout: 10000ms
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  task:
    scheduling:
      pool:
        size: 5

  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  # Railway (and most PaaS) inject the listen port via $PORT; fall back to 8080 locally.
  port: ${PORT:8080}
  tomcat:
    connection-timeout: 10s
    max-connections: 2000

# ── Observability (blueprint § Observability) ────────────────────────────────
# Alert thresholds (Grafana): error rate >1%, p99 latency >2s,
# Redis memory >80%, DB connections >80%.
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  health:
    # SMTP (Resend) reachability must NOT fail the service health check — a
    # transient mail outage would otherwise make /actuator/health return 503,
    # which the platform reads as unhealthy and restarts the container. Mail is
    # non-critical to liveness; DB and Redis health stay enabled (they are).
    mail:
      enabled: false
  metrics:
    tags:
      application: gridclan-backend

# Sentry crash reporting. DSN baked in as the default so it works without extra
# config; a SENTRY_DSN env var (Railway) still overrides. A Sentry DSN is a
# write-only ingest key (cannot read data), safe to commit.
sentry:
  dsn: ${SENTRY_DSN:https://ffe0af65b5213192d60235cc5ecf7f89@o4511615067619328.ingest.de.sentry.io/4511623088046160}
  environment: ${SENTRY_ENV:production}
  traces-sample-rate: 0.1
  send-default-pii: false # never PII (blueprint § Logging)

gridclan:
  # datasource:
  #   replica-url:   # set (env GRIDCLAN_DATASOURCE_REPLICAURL) to route
  #                  # read-only transactions to a Supabase read replica
  ws:
    relay:
      enabled: ${WS_RELAY_ENABLED:false} # true = external STOMP broker (multi-instance chat)
      host: ${WS_RELAY_HOST:localhost}
      port: ${WS_RELAY_PORT:61613}
      login: ${WS_RELAY_LOGIN:guest}
      passcode: ${WS_RELAY_PASSCODE:guest}
  jwt:
    secret: ${JWT_SECRET} # legacy — doubles as keys.v1
    active-kid: ${JWT_ACTIVE_KID:v1} # kid used to sign NEW tokens
    keys: # all listed keys stay valid for verification
      v1: ${JWT_SECRET}
      v2: ${JWT_SECRET_V2:} # staged next rotation; blank = ignored
      v3: ${JWT_SECRET_V3:}
    access-token-expiry-minutes: 5    # short window — a stolen access token dies fast (client auto-refreshes)
    refresh-token-expiry-days: 7      # rotated + hashed + reuse-detected; re-login weekly if idle
  # ── Gems (closed-loop in-game currency; no real-world value, no cashout) ──
  gems:
    daily-gift-limit: 500 # max gems a user can gift per day (abuse guard)
    ad-reward: 10 # gems granted per optional rewarded ad
    hint-cost: 10 # gems to buy an extra hint (non-tournament)
    revive-cost: 20 # gems to revive a failed solo/casual game
    replay-cost: 15 # gems to replay a game with a friend
    reward: # gems awarded per solved puzzle, by game type
      word-search: 5
    # ── Buyable gem packs (real money via Relworx) ──
    # CLEAN price per currency — a tidy local amount per currency. The charge
    # currency is derived from the player's mobile-money number. Prices are tuned
    # to roughly equal value (~$0.80 / ~$1.90 / ~$4.00). Keep ONLY the currencies
    # your Relworx account actually collects in (delete the rest); add more by
    # adding a line. UGX is confirmed by Relworx's docs; verify KES/TZS/RWF.
    store:
      packs:
        - id: starter
          label: Starter
          gems: 50
          ad-free-months: 1
          prices:
            UGX: 3000
            KES: 100
            TZS: 2000
            RWF: 1000
        - id: popular
          label: Most popular
          gems: 150
          ad-free-months: 4
          prices:
            UGX: 7000
            KES: 250
            TZS: 5000
            RWF: 2500
        - id: best_value
          label: Best value
          gems: 400
          ad-free-months: 8
          prices:
            UGX: 15000
            KES: 500
            TZS: 10000
            RWF: 5500
  mail:
    from: noreply@gridclanpuzzle.win
    from-name: GridClan Puzzles
    base-url: ${APP_BASE_URL:https://app.gridclanpuzzle.win}
  fcm:
    server-key: ${FCM_SERVER_KEY:}
    project-id: ${FCM_PROJECT_ID:gridclan-app}
  # ── Relworx mobile-money gateway (gem purchases) ──
  # Secrets live ONLY in env (gridclan-backend/.env). Blank api-key = store off
  # (purchase endpoints return a clear "not available" instead of calling Relworx).
  relworx:
    base-url: ${RELWORX_BASE_URL:https://payments.relworx.com/api}
    api-key: ${RELWORX_API_KEY:}
    account-no: ${RELWORX_ACCOUNT_NO:}
    webhook-secret: ${RELWORX_WEBHOOK_SECRET:}     # webhook signing key from Relworx dashboard
    webhook-url: ${RELWORX_WEBHOOK_URL:https://api.gridclanpuzzle.win/payments/relworx/webhook}
    send-webhook-url: ${RELWORX_SEND_WEBHOOK_URL:https://api.gridclanpuzzle.win/payments/relworx/send-payment/webhook}
    signature-header: ${RELWORX_SIGNATURE_HEADER:Relworx-Signature}
    timestamp-header: ${RELWORX_TIMESTAMP_HEADER:Relworx-Timestamp}
  # ── Prize-wallet withdrawals (money OUT via Relworx send-payment) ──
  # Limits are per currency in clean local amounts (no FX maths). min keeps
  # payouts above telco minimums + fees; max caps a single payout.
  wallet:
    default-min: 1
    welcome-bonus: 500        # one-time credit for every new player
    welcome-currency: UGX
    min-withdraw:
      UGX: 1000               # redemption threshold (= 5,000 points): kept low so
                              # the first payout feels reachable, but high enough
                              # to stay above telco minimums + the Relworx fee
      KES: 200
      TZS: 5000
      RWF: 2000
      BIF: 5000
      ZMW: 50
      GHS: 20
      NGN: 2000
      ZAR: 50
    max-withdraw:
      UGX: 5000000
      KES: 150000
      TZS: 3500000
      RWF: 1500000
      BIF: 4000000
      ZMW: 30000
      GHS: 15000
      NGN: 2000000
      ZAR: 25000
  # ── In-game voice (WebRTC ICE servers) ──
  # STUN finds a direct path; TURN relays audio when carrier-grade NAT blocks
  # P2P (most Ugandan mobile data). Defaults = Open Relay's free public TURN;
  # swap in a paid/self-hosted relay via the VOICE_* env vars when scaling.
  voice:
    stun-urls: ${VOICE_STUN_URLS:stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302}
    turn-urls: ${VOICE_TURN_URLS:turn:openrelay.metered.ca:80,turn:openrelay.metered.ca:443,turns:openrelay.metered.ca:443?transport=tcp}
    turn-username: ${VOICE_TURN_USERNAME:openrelayproject}
    turn-credential: ${VOICE_TURN_CREDENTIAL:openrelayproject}
  # ── Ad rewards (the earning system that funds payouts) ──
  # Every completed ad credits reward-amount reward-currency to the wallet.
  # The app displays balances as reward points at 1 point = UGX 0.2, so the
  # UGX 1.00 default shows as "5 points" per ad. Keep the payout at or below
  # ~30% of measured revenue per completed ad (tune via ADS_REWARD_AMOUNT).
  # Three networks form a failover chain — each has its ROLE (primary /
  # secondary / tertiary) so one provider outage never breaks the app.
  # A provider with a blank app-key is simply skipped. Keys live ONLY in env.
  ads:
    reward-amount: ${ADS_REWARD_AMOUNT:1.00}
    reward-currency: UGX
    daily-limit: ${ADS_DAILY_LIMIT:30}                 # per ACCOUNT / 24h
    device-daily-limit: ${ADS_DEVICE_DAILY_LIMIT:60}   # per DEVICE / 24h, across accounts (anti-farming; > account cap so shared phones aren't punished)
    session-expiry-minutes: 30
    test-mode: ${ADS_TEST_MODE:false}   # DEV ONLY: placeholder ad plays + credits
    providers:
      - id: ${AD_PROVIDER_1_ID:}        # e.g. admob
        name: ${AD_PROVIDER_1_NAME:}
        role: PRIMARY
        app-key: ${AD_PROVIDER_1_APP_KEY:}
      - id: ${AD_PROVIDER_2_ID:}        # e.g. unity
        name: ${AD_PROVIDER_2_NAME:}
        role: SECONDARY
        app-key: ${AD_PROVIDER_2_APP_KEY:}
      - id: ${AD_PROVIDER_3_ID:}        # e.g. applovin
        name: ${AD_PROVIDER_3_NAME:}
        role: TERTIARY
        app-key: ${AD_PROVIDER_3_APP_KEY:}

logging:
  level:
    com.gridclan: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
