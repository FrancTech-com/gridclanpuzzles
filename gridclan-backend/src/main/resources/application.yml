spring:
  application:
    name: gridclan-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:6543}/${DB_NAME:postgres}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate # Flyway owns schema; Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL:true}
      # Remote managed Redis (Upstash) needs headroom for the TLS handshake;
      # the old 2s timeout closed the channel mid-handshake (StacklessClosedChannelException).
      connect-timeout: 10000ms
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  task:
    scheduling:
      pool:
        size: 5

  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  # Railway (and most PaaS) inject the listen port via $PORT; fall back to 8080 locally.
  port: ${PORT:8080}
  tomcat:
    connection-timeout: 10s
    max-connections: 2000

# ── Observability (blueprint § Observability) ────────────────────────────────
# Alert thresholds (Grafana): error rate >1%, p99 latency >2s,
# Redis memory >80%, DB connections >80%.
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  health:
    # SMTP (Resend) reachability must NOT fail the service health check — a
    # transient mail outage would otherwise make /actuator/health return 503,
    # which the platform reads as unhealthy and restarts the container. Mail is
    # non-critical to liveness; DB and Redis health stay enabled (they are).
    mail:
      enabled: false
  metrics:
    tags:
      application: gridclan-backend

# Sentry crash reporting. DSN baked in as the default so it works without extra
# config; a SENTRY_DSN env var (Railway) still overrides. A Sentry DSN is a
# write-only ingest key (cannot read data), safe to commit.
sentry:
  dsn: ${SENTRY_DSN:https://ffe0af65b5213192d60235cc5ecf7f89@o4511615067619328.ingest.de.sentry.io/4511623088046160}
  environment: ${SENTRY_ENV:production}
  traces-sample-rate: 0.1
  send-default-pii: false # never PII (blueprint § Logging)

gridclan:
  # datasource:
  #   replica-url:   # set (env GRIDCLAN_DATASOURCE_REPLICAURL) to route
  #                  # read-only transactions to a Supabase read replica
  ws:
    relay:
      enabled: ${WS_RELAY_ENABLED:false} # true = external STOMP broker (multi-instance chat)
      host: ${WS_RELAY_HOST:localhost}
      port: ${WS_RELAY_PORT:61613}
      login: ${WS_RELAY_LOGIN:guest}
      passcode: ${WS_RELAY_PASSCODE:guest}
  jwt:
    secret: ${JWT_SECRET} # legacy — doubles as keys.v1
    active-kid: ${JWT_ACTIVE_KID:v1} # kid used to sign NEW tokens
    keys: # all listed keys stay valid for verification
      v1: ${JWT_SECRET}
      v2: ${JWT_SECRET_V2:} # staged next rotation; blank = ignored
      v3: ${JWT_SECRET_V3:}
    access-token-expiry-minutes: 5    # short window — a stolen access token dies fast (client auto-refreshes)
    refresh-token-expiry-days: 7      # rotated + hashed + reuse-detected; re-login weekly if idle
  # ── Gems (closed-loop in-game currency; no real-world value, no cashout) ──
  gems:
    daily-gift-limit: 500 # max gems a user can gift per day (abuse guard)
    ad-reward: 10 # gems granted per optional rewarded ad
    hint-cost: 10 # gems to buy an extra hint (non-tournament)
    revive-cost: 20 # gems to revive a failed solo/casual game
    replay-cost: 15 # gems to replay a game with a friend
    reward: # gems awarded per solved puzzle, by game type
      word-search: 5
    # ── Buyable gem packs (real money via Relworx) ──
    # CLEAN price per currency — a tidy local amount per currency. The charge
    # currency is derived from the player's mobile-money number. Prices are tuned
    # to roughly equal value (~$0.80 / ~$1.90 / ~$4.00). Keep ONLY the currencies
    # your Relworx account actually collects in (delete the rest); add more by
    # adding a line. UGX is confirmed by Relworx's docs; verify KES/TZS/RWF.
    store:
      packs:
        - id: starter
          label: Starter
          gems: 50
          prices:
            UGX: 3000
            KES: 100
            TZS: 2000
            RWF: 1000
        - id: popular
          label: Most popular
          gems: 150
          prices:
            UGX: 7000
            KES: 250
            TZS: 5000
            RWF: 2500
        - id: best_value
          label: Best value
          gems: 400
          prices:
            UGX: 15000
            KES: 500
            TZS: 10000
            RWF: 5500
  mail:
    from: noreply@gridclanpuzzle.win
    from-name: GridClan Puzzles
    base-url: ${APP_BASE_URL:https://app.gridclanpuzzle.win}
  fcm:
    server-key: ${FCM_SERVER_KEY:}
    project-id: ${FCM_PROJECT_ID:gridclan-app}
  # ── Relworx mobile-money gateway (gem purchases) ──
  # Secrets live ONLY in env (gridclan-backend/.env). Blank api-key = store off
  # (purchase endpoints return a clear "not available" instead of calling Relworx).
  relworx:
    base-url: ${RELWORX_BASE_URL:https://payments.relworx.com/api}
    api-key: ${RELWORX_API_KEY:}
    account-no: ${RELWORX_ACCOUNT_NO:}
    webhook-secret: ${RELWORX_WEBHOOK_SECRET:}     # webhook signing key from Relworx dashboard
    webhook-url: ${RELWORX_WEBHOOK_URL:https://api.gridclanpuzzle.win/payments/relworx/webhook}
    signature-header: ${RELWORX_SIGNATURE_HEADER:Relworx-Signature}
    timestamp-header: ${RELWORX_TIMESTAMP_HEADER:Relworx-Timestamp}

logging:
  level:
    com.gridclan: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
