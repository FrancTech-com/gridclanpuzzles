# ============================================================
# GridClan — NGINX Edge Configuration
# Layer 1 rate limiting (Layer 2 is Spring RateLimitFilter)
# ============================================================

events {
  worker_connections 4096;
  use epoll;
}

http {
  # ── Rate limit zones (token bucket) ──────────────────────────────────────
  limit_req_zone  $binary_remote_addr  zone=global_ip:10m   rate=60r/m;
  limit_req_zone  $binary_remote_addr  zone=auth_zone:5m    rate=5r/m;
  limit_req_zone  $binary_remote_addr  zone=moves_zone:10m  rate=30r/s;
  limit_conn_zone $binary_remote_addr  zone=conn_per_ip:10m;

  # ── Upstream (Spring Boot backend) ────────────────────────────────────────
  upstream gridclan_backend {
    server 127.0.0.1:8080;
    keepalive 64;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name api.gridclan.app;
    return 301 https://$host$request_uri;
  }

  # ── Main server block ─────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.gridclan.app;

    # TLS
    ssl_certificate     /etc/ssl/gridclan/fullchain.pem;
    ssl_certificate_key /etc/ssl/gridclan/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Content-Type-Options   nosniff;
    add_header X-Frame-Options          DENY;
    add_header X-XSS-Protection         "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy          "no-referrer";

    # Global connection + request limits
    limit_req  zone=global_ip  burst=20 nodelay;
    limit_conn conn_per_ip 20;

    # ── Auth endpoints — aggressive brute-force protection ───────────────
    location /auth/ {
      limit_req zone=auth_zone burst=3 nodelay;
      proxy_pass         http://gridclan_backend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Game move endpoint — high frequency, short burst ─────────────────
    location /game/session/move {
      limit_req zone=moves_zone burst=10 nodelay;
      proxy_pass         http://gridclan_backend;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 10s;
    }

    # ── All other endpoints ───────────────────────────────────────────────
    location / {
      proxy_pass              http://gridclan_backend;
      proxy_set_header        Host              $host;
      proxy_set_header        X-Real-IP         $remote_addr;
      proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header        X-Forwarded-Proto $scheme;
      proxy_connect_timeout   5s;
      proxy_read_timeout      30s;
      proxy_send_timeout      10s;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────
    location /actuator/health {
      proxy_pass http://gridclan_backend;
      limit_req_status 200;
    }

    # ── Block common attack paths ─────────────────────────────────────────
    location ~ /\. {
      deny all;
    }
  }
}
