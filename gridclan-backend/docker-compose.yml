version: "3.9"

# ============================================================
# GridClan — Docker Compose
# Services: postgres, redis, app (Spring Boot), nginx
#
# Usage:
#   cp .env.example .env && nano .env    # fill in secrets
#   docker-compose up -d
#   docker-compose logs -f app
#
# Health checks: each service waits until dependencies are healthy.
# ============================================================

services:

  # ── PostgreSQL 15 ───────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: gridclan_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-gridclan}
      POSTGRES_USER:     ${DB_USER:-gridclan_service}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Run init SQL on first boot (creates RLS roles etc)
      - ./sql/V1__init_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./sql/V2__tournament_participants.sql:/docker-entrypoint-initdb.d/02_tournament_participants.sql:ro
      - ./sql/V3__admin_role_profile.sql:/docker-entrypoint-initdb.d/03_admin.sql:ro
    ports:
      - "127.0.0.1:5432:5432"   # Localhost only — not exposed externally
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gridclan_service} -d ${DB_NAME:-gridclan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gridclan_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Spring Boot App ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gridclan_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST:         postgres
      DB_NAME:         ${DB_NAME:-gridclan}
      DB_USER:         ${DB_USER:-gridclan_service}
      DB_PASSWORD:     ${DB_PASSWORD}
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      REDIS_PASSWORD:  ${REDIS_PASSWORD:-}
      JWT_SECRET:      ${JWT_SECRET}
      MAIL_HOST:       ${MAIL_HOST:-smtp.sendgrid.net}
      MAIL_PORT:       ${MAIL_PORT:-587}
      MAIL_USERNAME:   ${MAIL_USERNAME:-apikey}
      MAIL_PASSWORD:   ${MAIL_PASSWORD}
      APP_BASE_URL:    ${APP_BASE_URL:-https://app.gridclanpuzzle.win}
      SPRING_PROFILES_ACTIVE: prod
      # JVM tuning for container
      JAVA_OPTS: >-
        -Xms256m -Xmx512m
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── NGINX ────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gridclan_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/gridclan:/etc/ssl/gridclan:ro   # Mount TLS certs from host
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: gridclan_network
