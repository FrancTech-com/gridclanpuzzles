# ETHELES STUDIO company site — plain static HTML, no build step.
# Deployed as its OWN Netlify site (separate from the GridClan web app):
# in Netlify, create a new site from this repo and set
#   Base directory:    etheles-site
#   Publish directory: etheles-site
# Netlify then reads this file from the base directory.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
